server:
  host: "0.0.0.0"
  port: 8080
  mode: "release"
  # 生产部署在 ingress/LB 处终止 TLS；如需进程内直接 HTTPS，改为 tls.enabled + 证书路径。
  behind_tls_proxy: true

logger:
  level: "info"
  path: "./logs"
  app_name: "gotobeta"

audit:
  enabled: true
  log_request_body: false
  log_response_body: false
  mask_sensitive_fields: true
  max_body_bytes: 65536

metrics:
  enabled: true
  path: "/metrics"
  namespace: "gotobeta"

sentry:
  enabled: false
  dsn: ""
  env: "prod"

tracing:
  endpoint: ""
  insecure: false
  sampler: "parent"
  sample_ratio: 0.1
  service_name: "gotobeta"
  service_version: ""
smtp:
  enabled: false
  host: "smtp.example.com"
  port: 587
  username: ""
  password: ""
  from: "gotobeta <no-reply@example.com>"
  tls_mode: "starttls"
  timeout: "10s"
http_client:
  default_timeout: "5s"
  default_response_body_limit: 1048576
  targets:
    example:
      base_url: "https://example.com"
      timeout: "3s"
      response_body_limit: 524288
redis:
  enabled: false
  addr: "REPLACE_VIA_APP_REDIS_ADDR"
  password: "REPLACE_VIA_APP_REDIS_PASSWORD"
  db: 0
  dial_timeout: "5s"
  read_timeout: "3s"
  write_timeout: "3s"
  key_prefix: "gotobeta:"
auth:
  jwt:
    enabled: true
    issuer: "gotobeta"
    audience: ""
    hmac_secret: "REPLACE_VIA_APP_AUTH_JWT_HMAC_SECRET"
    clock_skew: "30s"
    access_ttl: "15m"
    refresh_ttl: "720h"
  oauth:
    success_redirect_url: "https://app.example.com/auth/callback"
    state_ttl: "10m"
    login_code_ttl: "2m"
    github:
      enabled: false
      client_id: ""
      client_secret: "REPLACE_VIA_APP_AUTH_OAUTH_GITHUB_CLIENT_SECRET"
      redirect_url: "https://api.example.com/api/v1/auth/oauth/github/callback"
    google:
      enabled: false
      client_id: ""
      client_secret: "REPLACE_VIA_APP_AUTH_OAUTH_GOOGLE_CLIENT_SECRET"
      redirect_url: "https://api.example.com/api/v1/auth/oauth/google/callback"
  email:
    sender: "disabled"
    verification_ttl: "24h"
    password_reset_ttl: "1h"
database:
  driver: "mysql"
  # 生产环境严禁提交真实 DSN，请通过 APP_DATABASE_DSN 注入
  dsn: "REPLACE_VIA_APP_DATABASE_DSN"
  max_open_conns: 50
  max_idle_conns: 10
  conn_max_lifetime: 300
  conn_max_idle_time: 180
