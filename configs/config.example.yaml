server:
  host: "0.0.0.0"
  port: 8080
  mode: "release"
  max_request_body_bytes: 1048576
  max_header_bytes: 1048576
  cors_allowed_origins: []  # CORS 白名单，"*" 放行任意来源（不带凭证），空表示不放行跨域

logger:
  level: "info"
  path: "./logs"
  app_name: "gotobeta"

audit:
  enabled: true
  log_request_body: true
  log_response_body: false
  mask_sensitive_fields: true
  max_body_bytes: 65536

metrics:
  enabled: true
  path: "/metrics"
  namespace: "gotobeta"

sentry:
  enabled: false
  dsn: ""
  env: "local"
  sample_rate: 1.0

tracing:
  endpoint: ""
  insecure: true
  sampler: "parent"
  sample_ratio: 0.1
  service_name: "gotobeta"
  service_version: ""
smtp:
  enabled: false
  host: "127.0.0.1"
  port: 1025
  username: ""
  password: ""
  from: "gotobeta <no-reply@example.com>"
  tls_mode: "none"
  timeout: "5s"
http_client:
  default_timeout: "5s"
  default_response_body_limit: 1048576
  targets:
    example:
      base_url: "https://example.com"
      timeout: "3s"
      response_body_limit: 524288
redis:
  enabled: false
  addr: "127.0.0.1:6379"
  password: ""
  db: 0
  dial_timeout: "5s"
  read_timeout: "3s"
  write_timeout: "3s"
  key_prefix: "gotobeta:"
auth:
  jwt:
    enabled: true
    issuer: "gotobeta"
    audience: ""
    hmac_secret: "local-dev-hmac-secret-change-me"
    clock_skew: "30s"
    access_ttl: "15m"
    refresh_ttl: "720h"
  oauth:
    success_redirect_url: "http://localhost:3000/auth/callback"
    state_ttl: "10m"
    login_code_ttl: "2m"
    github:
      enabled: false
      client_id: ""
      client_secret: ""
      redirect_url: "http://localhost:8080/api/v1/auth/oauth/github/callback"
    google:
      enabled: false
      client_id: ""
      client_secret: ""
      redirect_url: "http://localhost:8080/api/v1/auth/oauth/google/callback"
  email:
    sender: "log"
    verification_ttl: "24h"
    password_reset_ttl: "1h"
database:
  driver: "mysql"
  dsn: "root:password@tcp(127.0.0.1:3306)/gotobeta?parseTime=true&charset=utf8mb4"
  max_open_conns: 25
  max_idle_conns: 5
  conn_max_lifetime: 300
  conn_max_idle_time: 180
im:
  recall_window: "2m"
  presence_ttl: "30s"
  ws_ticket_ttl: "30s"
  message_page_size: 100
  message_rate_per_minute: 120
  message_rate_burst: 20
  max_ws_connections: 10000
  max_conn_per_user: 10
  ws_handshake_rate_per_minute: 60
  ws_allowed_origins: []
  ws_pong_wait: "60s"
  ws_write_wait: "10s"
  ws_read_limit: 4096
objstore:
  endpoint: ""
  region: ""
  bucket: ""
  access_key: ""
  secret_key: ""
  use_ssl: false
  public_base_url: ""
  presign_ttl: "15m"
