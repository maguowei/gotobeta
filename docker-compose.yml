services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: gotobeta
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-ppassword"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      APP_ENV: local
      APP_CONFIG_DIR: /app/configs
      APP_DATABASE_DSN: root:password@tcp(mysql:3306)/gotobeta?parseTime=true&charset=utf8mb4
      APP_REDIS_ENABLED: "true"
      APP_REDIS_ADDR: redis:6379
      APP_OBJSTORE_ENDPOINT: minio:9000
      APP_OBJSTORE_BUCKET: gotobeta
      APP_OBJSTORE_ACCESS_KEY: minioadmin
      APP_OBJSTORE_SECRET_KEY: minioadmin
      APP_OBJSTORE_USE_SSL: "false"
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
  redis:
    image: redis:8.4-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  # 一次性创建 bucket（幂等）：minio 就绪后建桶并退出。
  minio-setup:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/gotobeta &&
      echo 'bucket ready'
      "

volumes:
  mysql-data:
  redis-data:
  minio-data:
