apiVersion: apps/v1
kind: Deployment
metadata:
  name: gotobeta
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gotobeta
  template:
    metadata:
      labels:
        app: gotobeta
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: server
          # 生产环境必须使用精确的镜像版本（git tag 或 commit sha），禁止使用 latest
          image: example.com/codego/gotobeta:REPLACE_WITH_RELEASE_TAG
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: APP_ENV
              value: "prod"
            - name: APP_CONFIG_DIR
              value: "/app/configs"
            - name: APP_DATABASE_DSN
              valueFrom:
                secretKeyRef:
                  name: gotobeta-runtime
                  key: database-dsn
            - name: APP_AUTH_JWT_HMAC_SECRET
              valueFrom:
                secretKeyRef:
                  name: gotobeta-runtime
                  key: auth-jwt-hmac-secret
            - name: APP_REDIS_ENABLED
              value: "true"
            - name: APP_REDIS_ADDR
              valueFrom:
                configMapKeyRef:
                  name: gotobeta-runtime
                  key: redis-addr
          # readOnlyRootFilesystem=true 下，将日志目录与临时目录挂为 emptyDir
          volumeMounts:
            - name: logs
              mountPath: /app/logs
            - name: tmp
              mountPath: /tmp
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 12
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
      volumes:
        - name: logs
          emptyDir: {}
        - name: tmp
          emptyDir: {}
